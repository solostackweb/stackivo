name: Cron jobs

# Replaces Vercel Cron (Pro-only). Calls the existing Next.js cron
# API routes via HTTP. All endpoints are protected by the CRON_SECRET
# env var — add it to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#   Name:  CRON_SECRET
#   Value: (same value as your Vercel/production CRON_SECRET env var)
#
# APP_URL is also required:
#   Name:  APP_URL
#   Value: https://stackivo.me  (no trailing slash)

on:
  schedule:
    # ── Daily invoice reminders ─────────────────────────────────────────
    # Due-soon: 3:00 UTC = 8:30 AM IST
    - cron: "0 3 * * *"
    # Overdue:  3:30 UTC = 9:00 AM IST
    - cron: "30 3 * * *"
    # ── Admin export (hourly) ───────────────────────────────────────────
    - cron: "0 * * * *"
    # ── Operational monitor (every 15 min) ──────────────────────────────
    - cron: "*/15 * * * *"
  # Manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "invoices-overdue"
        type: choice
        options:
          - invoices-overdue
          - invoices-due-soon
          - admin-export
          - monitor

# Shared curl helper — defined once, reused by every job via env
env:
  BASE_URL: ${{ secrets.APP_URL }}
  SECRET:   ${{ secrets.CRON_SECRET }}

jobs:
  # ── Due-soon reminder (daily at 3:00 UTC) ────────────────────────────────
  invoices-due-soon:
    name: Invoice due-soon reminders
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'invoices-due-soon') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    steps:
      - name: Call /api/cron/invoices-due-soon
        run: |
          echo "Calling: $BASE_URL/api/cron/invoices-due-soon"
          HTTP_CODE=$(curl -s -L --location-trusted -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$BASE_URL/api/cron/invoices-due-soon")
          BODY=$(cat /tmp/body.txt)
          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi

  # ── Overdue reminders (daily at 3:30 UTC) ────────────────────────────────
  invoices-overdue:
    name: Overdue invoice reminders
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'invoices-overdue') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *')
    steps:
      - name: Call /api/cron/invoices-overdue
        run: |
          echo "Calling: $BASE_URL/api/cron/invoices-overdue"
          HTTP_CODE=$(curl -s -L --location-trusted -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$BASE_URL/api/cron/invoices-overdue")
          BODY=$(cat /tmp/body.txt)
          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi

  # ── Admin export (hourly) ─────────────────────────────────────────────────
  admin-export:
    name: Admin export
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'admin-export') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
    steps:
      - name: Call /api/cron/admin-export
        run: |
          echo "Calling: $BASE_URL/api/cron/admin-export"
          HTTP_CODE=$(curl -s -L --location-trusted -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$BASE_URL/api/cron/admin-export")
          BODY=$(cat /tmp/body.txt)
          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi

  # ── Operational monitor (every 15 min) ───────────────────────────────────
  monitor:
    name: Operational monitor
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'monitor') ||
      (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *')
    steps:
      - name: Call /api/cron/monitor
        run: |
          echo "Calling: $BASE_URL/api/cron/monitor"
          HTTP_CODE=$(curl -s -L --location-trusted -o /tmp/body.txt -w "%{http_code}" \
            -H "Authorization: Bearer $SECRET" \
            "$BASE_URL/api/cron/monitor")
          BODY=$(cat /tmp/body.txt)
          echo "HTTP status : $HTTP_CODE"
          echo "Response    : $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE — $BODY"
            exit 1
          fi
