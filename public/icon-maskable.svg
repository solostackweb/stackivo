<!--
  Maskable variant: keeps the brand mark inside the safe zone (40% inner radius)
  so platform-specific masks (circle, squircle, rounded square) don't crop the
  glyph. Background fills the full canvas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <g transform="translate(64,64) scale(0.75)">
    <rect x="96" y="148" width="280" height="76" rx="38" fill="#FFFFFF"/>
    <rect x="136" y="288" width="280" height="76" rx="38" fill="#FFFFFF" opacity="0.92"/>
  </g>
</svg>
