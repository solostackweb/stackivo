<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0a1020" />
    <title>Offline · Stackivo</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(1100px 600px at 50% -10%, rgba(99,102,241,0.18), transparent 60%),
          #0a1020;
        color: #E5E7EB;
        display: grid;
        place-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 440px;
        width: 100%;
        background: rgba(20, 22, 38, 0.7);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 32px;
        text-align: center;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 18px;
        border-radius: 14px;
        display: grid; place-items: center;
        background: linear-gradient(135deg, #6366F1, #4338CA);
        box-shadow: 0 10px 30px rgba(99,102,241,0.45);
      }
      h1 {
        font-size: 22px;
        line-height: 1.25;
        letter-spacing: -0.01em;
        margin: 0 0 8px;
        color: #F8FAFC;
      }
      p { margin: 0 0 22px; color: #9CA3AF; line-height: 1.55; font-size: 14px; }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: linear-gradient(135deg, #6366F1, #4338CA);
        color: white;
        font-weight: 600;
        font-size: 14px;
        padding: 12px 20px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(99,102,241,0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(99,102,241,0.5); }
      .hint { margin-top: 16px; font-size: 12px; color: #6B7280; }
      @media (prefers-color-scheme: light) {
        body { background:
          radial-gradient(1100px 600px at 50% -10%, rgba(99,102,241,0.10), transparent 60%),
          #F8FAFC; color: #0F172A; }
        .card { background: white; border-color: rgba(15,23,42,0.08); box-shadow: 0 20px 50px rgba(15,23,42,0.08); }
        h1 { color: #0F172A; }
        p { color: #475569; }
        .hint { color: #94A3B8; }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="badge" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect x="96" y="148" width="280" height="76" rx="38" fill="white"/>
          <rect x="136" y="288" width="280" height="76" rx="38" fill="white" opacity="0.92"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        Stackivo needs a connection to load fresh data. Once you're back online,
        your workspace will pick up exactly where you left off.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <p class="hint">Pages you've already visited may still work from cache.</p>
    </main>
    <script>
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
